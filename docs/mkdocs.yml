site_name: Tech Challenge — FIAP
site_author: Paulo Henrique Almeida, Gabriela Almeida
site_description: Repositório das entregas do Tech Challenge do programa POSTECH AI Scientist — FIAP.

extra_css:
  - assets/extra.css

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: light blue
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: light blue
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: pt

markdown_extensions:
  - attr_list
  - md_in_html

extra:
  analytics: ~

nav:
  - Home: index.md
  - Fase 1 — NPS Preditivo:
    - Visão Geral: fase-1/index.md
    - Case: fase-1/case-nps-preditivo.md
    - EDA: fase-1/eda.md
    - Como Reproduzir: fase-1/getting-started.md
