site_name: Tech Challenge — FIAP
site_author: Paulo Henrique Almeida, Gabriela Almeida
site_description: Repositório das entregas do Tech Challenge do programa POSTECH AI Scientist — FIAP.

extra_css:
  - assets/extra.css

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search:
      lang: pt

markdown_extensions:
  - attr_list
  - md_in_html

extra:
  analytics: ~

nav:
  - Home: index.md
  - Fase 1 — NPS Preditivo:
    - Visão Geral: fase-1/index.md
    - Planejamento: fase-1/planejamento.md
    - Case: fase-1/case-nps-preditivo.md
    - 1. Problema de Negócio: fase-1/problema-negocio.md
    - 2. Business Canvas: fase-1/business-canvas.md
    - 3. Reflexões do Desafio: fase-1/reflexoes.md
    - 4. Análise e Hipóteses: fase-1/analise-hipoteses.md
    - 5. EDA: fase-1/eda.md
    - 6. Preparação dos Dados: fase-1/preparacao-dados.md
    - 7. Proposta de Solução: fase-1/proposta-solucao.md
    - 8. Avaliação dos Resultados: fase-1/avaliacao.md
    - 9. Apresentação Final: fase-1/apresentacao-final.md
    - Como Reproduzir: fase-1/getting-started.md
